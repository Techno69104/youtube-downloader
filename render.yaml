services:
  - type: web
    name: youtube-downloader
    runtime: image
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    dockerCommand: |
      apt-get update && 
      apt-get install -y python3-pip ffmpeg && 
      pip3 install --upgrade yt-dlp && 
      node server.js
    envVars:
      - key: YT_COOKIES
        sync: false
