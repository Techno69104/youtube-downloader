<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .video-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }
        .video-info img {
            max-width: 100%;
            border-radius: 10px;
        }
        .quality-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .quality-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .quality-btn:hover {
            background: #5a67d8;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .feature {
            text-align: center;
            padding: 10px;
        }
        .feature i {
            font-size: 24px;
            color: #667eea;
        }
        .feature span {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .quality-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 YouTube Video Downloader</h1>
        <div class="subtitle">Download videos in MP4 format - Completely Free</div>
        
        <input type="text" id="url" placeholder="Paste YouTube URL here (e.g., https://youtube.com/watch?v=...)" />
        <button id="getInfoBtn">🔍 Get Video Information</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Fetching video information...</p>
        </div>
        
        <div class="video-info" id="videoInfo">
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 150px;">
                    <img id="thumbnail" alt="Video thumbnail">
                </div>
                <div style="flex: 2;">
                    <h3 id="title" style="margin-top: 0;"></h3>
                    <p id="details"></p>
                </div>
            </div>
            <div class="quality-buttons" id="qualityButtons"></div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="features">
            <div class="feature">
                <div>🎥</div>
                <span>720p & 1080p</span>
            </div>
            <div class="feature">
                <div>🎵</div>
                <span>MP3 Audio</span>
            </div>
            <div class="feature">
                <div>⚡</div>
                <span>Fast Download</span>
            </div>
            <div class="feature">
                <div>🆓</div>
                <span>100% Free</span>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const getInfoBtn = document.getElementById('getInfoBtn');
        const loadingDiv = document.getElementById('loading');
        const videoInfoDiv = document.getElementById('videoInfo');
        const errorDiv = document.getElementById('error');
        
        getInfoBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                showError('Please enter a YouTube URL');
                return;
            }
            
            showLoading(true);
            hideError();
            hideVideoInfo();
            
            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Failed to fetch video info');
                }
                
                displayVideoInfo(data);
            } catch (err) {
                showError(err.message);
            } finally {
                showLoading(false);
            }
        });
        
        function displayVideoInfo(info) {
            document.getElementById('thumbnail').src = info.thumbnail;
            document.getElementById('title').textContent = info.title;
            document.getElementById('details').textContent = `Duration: ${formatDuration(info.duration)} | Channel: ${info.channel}`;
            
            const buttonsContainer = document.getElementById('qualityButtons');
            buttonsContainer.innerHTML = '';
            
            const qualities = [
                { label: '2160p (4K)', itag: '313', format: 'mp4' },
                { label: '1440p (2K)', itag: '271', format: 'mp4' },
                { label: '1080p HD', itag: '137', format: 'mp4' },
                { label: '720p HD', itag: '22', format: 'mp4' },
                { label: '480p', itag: '135', format: 'mp4' },
                { label: '360p', itag: '18', format: 'mp4' },
                { label: 'MP3 Audio', itag: '140', format: 'mp3' }
            ];
            
            qualities.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q.label;
                btn.className = 'quality-btn';
                btn.onclick = () => downloadVideo(urlInput.value.trim(), q.itag, q.format);
                buttonsContainer.appendChild(btn);
            });
            
            videoInfoDiv.style.display = 'block';
        }
        
        function downloadVideo(url, itag, format) {
            const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&itag=${itag}&format=${format}`;
            window.location.href = downloadUrl;
        }
        
        function formatDuration(seconds) {
            if (!seconds) return 'Unknown';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) return `${hours}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            return `${minutes}:${secs.toString().padStart(2,'0')}`;
        }
        
        function showLoading(show) { loadingDiv.style.display = show ? 'block' : 'none'; }
        function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
        function hideError() { errorDiv.style.display = 'none'; }
        function hideVideoInfo() { videoInfoDiv.style.display = 'none'; }
    </script>
</body>
</html>
