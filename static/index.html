<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { text-align: center; margin-top: 24px; display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .video-info {
            margin-top: 24px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            display: none;
        }
        .video-preview { display: flex; gap: 20px; flex-wrap: wrap; }
        .video-preview img { width: 160px; border-radius: 12px; object-fit: cover; }
        .video-details { flex: 1; }
        .video-details h3 { margin-bottom: 8px; color: #1e293b; }
        .quality-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .quality-btn {
            flex: 1;
            min-width: 85px;
            padding: 10px;
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
        }
        .quality-btn:hover { background: #667eea; color: white; }
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .feature { text-align: center; }
        .feature div { font-size: 24px; }
        .feature span { font-size: 12px; color: #64748b; }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .features { grid-template-columns: repeat(2, 1fr); }
            .video-preview { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 YouTube Video Downloader</h1>
        <div class="subtitle">Download any YouTube video - 720p MP4 or MP3 Audio</div>
        
        <input type="text" id="url" placeholder="Paste YouTube URL here" />
        <button id="getInfoBtn">🔍 Get Video Information</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching video information...</p>
        </div>
        
        <div class="video-info" id="videoInfo">
            <div class="video-preview">
                <img id="thumbnail" alt="Thumbnail">
                <div class="video-details">
                    <h3 id="title"></h3>
                    <p id="details"></p>
                </div>
            </div>
            <div class="quality-buttons" id="qualityButtons"></div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="features">
            <div class="feature"><div>🎥</div><span>720p HD</span></div>
            <div class="feature"><div>🎵</div><span>MP3 Audio</span></div>
            <div class="feature"><div>⚡</div><span>Fast Download</span></div>
            <div class="feature"><div>🆓</div><span>Free</span></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const getInfoBtn = document.getElementById('getInfoBtn');
        const loadingDiv = document.getElementById('loading');
        const videoInfoDiv = document.getElementById('videoInfo');
        const errorDiv = document.getElementById('error');
        
        getInfoBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                showError('Please enter a YouTube URL');
                return;
            }
            
            showLoading(true);
            hideError();
            hideVideoInfo();
            
            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                displayVideoInfo(data, url);
            } catch (err) {
                showError(err.message);
            } finally {
                showLoading(false);
            }
        });
        
        function displayVideoInfo(info, videoUrl) {
            document.getElementById('thumbnail').src = info.thumbnail;
            document.getElementById('title').textContent = info.title;
            const mins = Math.floor(info.duration / 60);
            const secs = info.duration % 60;
            const durationText = info.duration > 0 ? `⏱️ ${mins}:${secs.toString().padStart(2,'0')} • ` : '';
            document.getElementById('details').innerHTML = `${durationText}📺 ${info.author}`;
            
            const buttonsContainer = document.getElementById('qualityButtons');
            buttonsContainer.innerHTML = '';
            
            const qualities = [
                { label: '🎥 720p HD', quality: '720' },
                { label: '🎥 480p', quality: '480' },
                { label: '🎥 360p', quality: '360' },
                { label: '🎵 MP3 Audio', quality: 'mp3' }
            ];
            
            qualities.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q.label;
                btn.className = 'quality-btn';
                btn.onclick = () => {
                    window.location.href = `/api/download?url=${encodeURIComponent(videoUrl)}&quality=${q.quality}`;
                };
                buttonsContainer.appendChild(btn);
            });
            
            videoInfoDiv.style.display = 'block';
        }
        
        function showLoading(show) { loadingDiv.style.display = show ? 'block' : 'none'; }
        function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
        function hideError() { errorDiv.style.display = 'none'; }
        function hideVideoInfo() { videoInfoDiv.style.display = 'none'; }
    </script>
</body>
</html>
